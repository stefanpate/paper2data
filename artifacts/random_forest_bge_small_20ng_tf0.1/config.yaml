data:
  name: 20ng
  subset: all
  remove:
  - headers
  - footers
  - quotes
  categories: null
featurizer:
  name: bge_small
  precomputed: true
  model_id: BAAI/bge-small-en-v1.5
  batch_size: 64
  normalize_embeddings: true
  passage_prefix: ''
  trust_remote_code: false
  device: null
  cache_dir: ${hydra:runtime.cwd}/artifacts/_embed_cache
  param_grid: {}
model:
  name: random_forest
  estimator:
    _target_: sklearn.ensemble.RandomForestClassifier
    n_jobs: 1
    random_state: 0
  param_grid:
    clf__n_estimators:
    - 200
    clf__max_features:
    - sqrt
    - log2
    clf__min_samples_leaf:
    - 1
    - 5
cv:
  name: nested
  outer_splits: 5
  inner_splits: 3
  shuffle: true
  scoring: f1_macro
  refit_inner: true
run_name: ${model.name}_${featurizer.name}_${data.name}_tf${train_fraction}
seed: 42
n_jobs: -1
test_size: 0.2
train_fraction: 0.1
artifacts_dir: ${hydra:runtime.cwd}/artifacts/${run_name}
