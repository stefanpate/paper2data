data:
  name: 20ng
  subset: all
  remove:
  - headers
  - footers
  - quotes
  categories: null
featurizer:
  name: bge_small
  precomputed: true
  model_id: BAAI/bge-small-en-v1.5
  batch_size: 64
  normalize_embeddings: true
  passage_prefix: ''
  trust_remote_code: false
  device: null
  cache_dir: ${hydra:runtime.cwd}/artifacts/_embed_cache
  param_grid: {}
model:
  name: logreg
  estimator:
    _target_: sklearn.linear_model.LogisticRegression
    max_iter: 1000
    solver: lbfgs
  param_grid:
    clf__C:
    - 0.1
    - 1.0
    - 10.0
cv:
  name: nested
  outer_splits: 5
  inner_splits: 3
  shuffle: true
  scoring: f1_macro
  refit_inner: true
run_name: ${model.name}_${featurizer.name}_${data.name}_tf${train_fraction}
seed: 42
n_jobs: -1
test_size: 0.2
train_fraction: 0.25
artifacts_dir: ${hydra:runtime.cwd}/artifacts/${run_name}
