data:
  name: 20ng
  subset: all
  remove:
  - headers
  - footers
  - quotes
  categories: null
featurizer:
  name: bge_small
  precomputed: true
  model_id: BAAI/bge-small-en-v1.5
  batch_size: 64
  normalize_embeddings: true
  passage_prefix: ''
  trust_remote_code: false
  device: null
  cache_dir: ${hydra:runtime.cwd}/artifacts/_embed_cache
  param_grid: {}
model:
  name: linear_svm
  estimator:
    _target_: sklearn.svm.LinearSVC
    dual: auto
  param_grid:
    clf__C:
    - 0.1
    - 1.0
    - 10.0
cv:
  name: kfold
  splits: 3
  shuffle: true
  scoring: f1_macro
run_name: ${model.name}_${featurizer.name}_${data.name}_n${n_per_category}
seed: 42
n_jobs: -1
test_size: 0.2
n_per_category: 10
artifacts_dir: ${hydra:runtime.cwd}/artifacts/${run_name}
