hydra:
  run:
    dir: ${artifacts_dir}/hydra
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task: []
  job:
    name: train
    chdir: false
    override_dirname: ''
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/stef/paper2data
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/stef/paper2data/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      cv: nested
      model: nb
      featurizer: tfidf
      data: twenty_ng
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
data:
  name: 20ng
  subset: all
  remove:
  - headers
  - footers
  - quotes
  categories: null
featurizer:
  name: tfidf
  estimator:
    _target_: sklearn.feature_extraction.text.TfidfVectorizer
    lowercase: true
    stop_words: english
    ngram_range:
    - 1
    - 1
    min_df: 2
    max_df: 0.95
    sublinear_tf: true
  param_grid:
    tfidf__ngram_range:
    - - 1
      - 1
    - - 1
      - 2
    tfidf__min_df:
    - 2
    - 5
model:
  name: nb
  estimator:
    _target_: sklearn.naive_bayes.MultinomialNB
  param_grid:
    clf__alpha:
    - 0.01
    - 0.1
    - 0.5
    - 1.0
cv:
  name: nested
  outer_splits: 5
  inner_splits: 3
  shuffle: true
  scoring: f1_macro
  refit_inner: true
run_name: ${model.name}_${featurizer.name}_${data.name}
seed: 42
n_jobs: -1
test_size: 0.2
artifacts_dir: ${hydra:runtime.cwd}/artifacts/${run_name}
