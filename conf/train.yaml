defaults:
  - data: twenty_ng
  - featurizer: tfidf
  - model: nb
  - cv: nested
  - _self_

run_name: ${model.name}_${featurizer.name}_${data.name}_tf${train_fraction}
seed: 42
n_jobs: -1

# Held-out test fraction (stratified split applied to all of 20NG)
test_size: 0.2

# Fraction of the training split actually used to fit models (stratified
# subsample). Set to 1.0 to use all training data; lower values support
# learning-curve / data-efficiency experiments.
train_fraction: 1.0

# Where to persist artifacts
artifacts_dir: ${hydra:runtime.cwd}/artifacts/${run_name}

hydra:
  run:
    dir: ${artifacts_dir}/hydra
  job:
    chdir: false
