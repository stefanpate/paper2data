name: tfidf
# The vectorizer is fit once on the FULL corpus (train+val+test) in train.py,
# outside the CV loop, so its hyperparameters are fixed here rather than tuned.
# This mirrors the embedding featurizers (which tune nothing) for a fair
# data-efficiency comparison.
estimator:
  _target_: sklearn.feature_extraction.text.TfidfVectorizer
  lowercase: true
  stop_words: english
  ngram_range: [1, 2]
  min_df: 2
  max_df: 0.95
  sublinear_tf: true
