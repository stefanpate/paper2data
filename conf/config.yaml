defaults:
  - data: twenty_ng
  - featurizer: tfidf
  - model: nb
  - cv: nested
  - _self_

run_name: ${model.name}_${featurizer.name}_${data.name}
seed: 42
n_jobs: -1

# Held-out test fraction (stratified split applied to all of 20NG)
test_size: 0.2

# Where to persist artifacts
artifacts_dir: ${hydra:runtime.cwd}/artifacts/${run_name}

hydra:
  run:
    dir: ${artifacts_dir}/hydra
  job:
    chdir: false
